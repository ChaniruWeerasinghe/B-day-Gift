<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    
    <div class="background-animation">
        <!-- background dynamic orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="glass-card">
        <div class="image-container">
            <img src="assets/3d_gift_box.png" alt="Birthday Celebration" class="hero-image">
        </div>
        <h1 class="greeting">Happy Birthday, <span class="highlight">Brother</span>!</h1>
        <p class="message">Wishing you a day filled with joy, success, and everything you've been working so hard for. Let's make this year the best one yet.</p>
        
        <button id="celebrate-btn" class="glow-btn">Celebrate</button>
    </main>

    <canvas id="confetti-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
